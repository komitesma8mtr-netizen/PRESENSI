name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate App Icons
        run: |
          mkdir -p res/icons
          # Generate all required Android icon sizes from icon.png
          convert icon.png -resize 36x36   res/icons/icon-36-ldpi.png
          convert icon.png -resize 48x48   res/icons/icon-48-mdpi.png
          convert icon.png -resize 72x72   res/icons/icon-72-hdpi.png
          convert icon.png -resize 96x96   res/icons/icon-96-xhdpi.png
          convert icon.png -resize 144x144 res/icons/icon-144-xxhdpi.png
          convert icon.png -resize 192x192 res/icons/icon-192-xxxhdpi.png
          ls -la res/icons/

      - name: Create Cordova Project
        run: |
          cordova create apk-build com.sman8mtr.presensikelas "Presensi Kelas"
          cd apk-build
          # Copy web app files to www
          rm -rf www/*
          cp ../*.html www/
          cp ../*.js www/
          cp ../*.css www/
          cp ../*.png www/ 2>/dev/null || true
          cp ../*.jpeg www/ 2>/dev/null || true
          cp ../*.jpg www/ 2>/dev/null || true
          # Copy icon files
          mkdir -p res/icons
          cp ../res/icons/* res/icons/

      - name: Configure Cordova
        run: |
          cd apk-build
          cat > config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.sman8mtr.presensikelas" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>Presensi Kelas</name>
              <description>Aplikasi Presensi Kelas SMAN 8 Mataram</description>
              <author email="admin@sman8mataram.sch.id">SMAN 8 Mataram</author>
              <content src="index.html" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <allow-navigation href="*" />
              <preference name="StatusBarBackgroundColor" value="#16a34a" />
              <preference name="Orientation" value="portrait" />
              <preference name="android-minSdkVersion" value="24" />
              <preference name="android-targetSdkVersion" value="34" />
              <preference name="GradlePluginGoogleServicesEnabled" value="false" />
              <preference name="AndroidPersistentFileLocation" value="Compatibility" />
              <platform name="android">
                  <preference name="Scheme" value="https" />
                  <preference name="MixedContentMode" value="0" />
                  <icon density="ldpi" src="res/icons/icon-36-ldpi.png" />
                  <icon density="mdpi" src="res/icons/icon-48-mdpi.png" />
                  <icon density="hdpi" src="res/icons/icon-72-hdpi.png" />
                  <icon density="xhdpi" src="res/icons/icon-96-xhdpi.png" />
                  <icon density="xxhdpi" src="res/icons/icon-144-xxhdpi.png" />
                  <icon density="xxxhdpi" src="res/icons/icon-192-xxxhdpi.png" />
                  <config-file parent="/*" target="AndroidManifest.xml">
                      <uses-permission android:name="android.permission.CAMERA" />
                      <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
                      <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
                      <uses-permission android:name="android.permission.ACCESS_LOCATION_EXTRA_COMMANDS" />
                      <uses-permission android:name="android.permission.INTERNET" />
                      <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
                      <uses-feature android:name="android.hardware.camera" android:required="false" />
                      <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />
                      <uses-feature android:name="android.hardware.location.gps" android:required="false" />
                  </config-file>
              </platform>
          </widget>
          XMLEOF

      - name: Add Android Platform
        run: |
          cd apk-build
          cordova platform add android@13

      - name: Inject Permissions into AndroidManifest
        run: |
          cd apk-build
          MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Add permissions before the <application> tag
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_LOCATION_EXTRA_COMMANDS" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />\n    <uses-feature android:name="android.hardware.location.gps" android:required="false" />\n    <application|' "$MANIFEST"
            echo "=== AndroidManifest.xml permissions added ==="
            head -30 "$MANIFEST"
          fi

      - name: Patch Gradle for JDK 17 compatibility
        run: |
          cd apk-build
          # Fix gradle wrapper to use compatible version
          GRADLE_PROPS="platforms/android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$GRADLE_PROPS" ]; then
            sed -i 's|gradle-.*-all.zip|gradle-8.7-all.zip|g' "$GRADLE_PROPS"
            sed -i 's|gradle-.*-bin.zip|gradle-8.7-bin.zip|g' "$GRADLE_PROPS"
          fi
          # Set Android Gradle Plugin version compatible with Gradle 8.7
          BUILD_GRADLE="platforms/android/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            sed -i "s|com.android.tools.build:gradle:.*'|com.android.tools.build:gradle:8.3.2'|g" "$BUILD_GRADLE"
          fi
          # Fix cdvCompileSdkVersion if needed
          APP_BUILD_GRADLE="platforms/android/app/build.gradle"
          if [ -f "$APP_BUILD_GRADLE" ]; then
            sed -i 's/cdvCompileSdkVersion/34/g' "$APP_BUILD_GRADLE" 2>/dev/null || true
          fi

      - name: Build Debug APK
        run: |
          cd apk-build
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          cordova build android -- --gradleArg=-Dorg.gradle.jvmargs=-Xmx2048m

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PresensiKelas-APK
          path: apk-build/platforms/android/app/build/outputs/apk/debug/*.apk
          retention-days: 90
